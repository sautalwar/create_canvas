trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

steps:
  - checkout: self
    clean: false

  - task: UseNode@1
    inputs:
      version: '20.x'
    continueOnError: true

  - task: Npm@1
    displayName: 'Install dependencies'
    inputs:
      command: 'ci'

  - task: Npm@1
    displayName: 'Build'
    inputs:
      command: 'custom'
      customCommand: 'run build'

  - task: Npm@1
    displayName: 'Test'
    inputs:
      command: 'custom'
      customCommand: 'test -- --runInBand --forceExit'
