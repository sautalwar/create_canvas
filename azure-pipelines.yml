trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

steps:
  - checkout: self
    clean: false

  - task: BatchScript@1
    displayName: 'Build & Test'
    inputs:
      filename: build.cmd
      failOnStandardError: false
