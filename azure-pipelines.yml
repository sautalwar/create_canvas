# Node.js / TypeScript pipeline for sautalwar/create_canvas
# Starter: safe to run on an empty or early-stage repo.
# Each build/test step is guarded so it skips gracefully until the
# matching npm script exists, then starts doing real work automatically.

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'

steps:
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: $(NODE_VERSION)

  - script: |
      echo "Repo contents:"
      ls -la
      echo "Node: $(node --version)"
      echo "npm:  $(npm --version)"
    displayName: 'Diagnostics'

  - script: |
      if [ -f package-lock.json ]; then
        echo "Lockfile found -> npm ci"
        npm ci
      elif [ -f package.json ]; then
        echo "No lockfile -> npm install"
        npm install
      else
        echo "No package.json yet -> skipping install"
      fi
    displayName: 'Install dependencies'

  - script: |
      if [ -f package.json ] && npm run | grep -q "^  build"; then
        npm run build
      else
        echo "No 'build' script yet -> skipping"
      fi
    displayName: 'Build'

  - script: |
      if [ -f package.json ] && npm run | grep -q "^  test"; then
        npm test
      else
        echo "No 'test' script yet -> skipping"
      fi
    displayName: 'Test'