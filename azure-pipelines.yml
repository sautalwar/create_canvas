trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

steps:
  - checkout: self
    clean: false

  - bash: |
      echo "=== Environment ==="
      node --version
      npm --version
      echo "=== Install ==="
      npm ci --prefer-offline 2>/dev/null || npm ci
      echo "=== Build ==="
      npm run build
      echo "=== Test ==="
      npm test -- --runInBand --forceExit
      echo "=== PIPELINE PASSED ==="
    displayName: 'Build & Test'
    env:
      NODE_OPTIONS: '--max-old-space-size=512'
