# Node.js / TypeScript pipeline for sautalwar/create_canvas
# Validates PRs and merges - optimized for self-hosted Windows agent

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

steps:
  - powershell: |
      Write-Host "Node: $(node --version)"
      Write-Host "npm: $(npm --version)"
    displayName: 'Environment Check'

  - powershell: npm ci --prefer-offline
    displayName: 'Install dependencies'

  - powershell: npm run build
    displayName: 'Build'

  - powershell: npm test -- --runInBand --forceExit
    displayName: 'Test'
