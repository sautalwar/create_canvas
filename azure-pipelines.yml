trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

steps:
  - checkout: self
    clean: false

  - script: |
      echo "=== Build Validation ==="
      node --version
      npm --version
      echo "=== Installing ==="
      call npm ci --prefer-offline
      echo "=== Building ==="
      call npm run build
      echo "=== Testing ==="
      call npm test -- --runInBand --forceExit
      echo "=== PIPELINE PASSED ==="
    displayName: 'Build & Test'
    env:
      NODE_OPTIONS: '--max-old-space-size=512'
