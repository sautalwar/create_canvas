trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

steps:
  - checkout: self
    clean: false

  - task: CmdLine@2
    displayName: 'Build & Test'
    inputs:
      script: |
        node --version
        npm --version
        call npm ci
        call npm run build
        call npm test -- --runInBand --forceExit
      failOnStderr: false
